<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Парсер валют{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .plot-img { max-width: 100%; height: auto; margin-top: 10px; border: 1px solid #ccc; }
        .error { color: red; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Текущие курсы</a>
        <a href="{{ url_for('history') }}">История</a>
        <a href="{{ url_for('plot_view') }}">График</a>
    </nav>
    <h1>{% block header %}{% endblock %}</h1>
    {% block content %}{% endblock %}
</body>
</html>
